<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şehrin Efendileri | Haftalık Arşiv</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #000;
    color: #f0f0f0;
}

.overlay {
    background: rgba(0,0,0,0.8);
    min-height: 100vh;
    padding: 40px 0;
}

.container {
    width: 95%;
    max-width: 1100px;
    margin: auto;
    text-align: center;
}

.glass-panel {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 12px;
    padding: 25px;
    margin-bottom: 20px;
}

h1 {
    color: #d4af37;
}

.filters {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

select {
    padding: 10px;
    background: black;
    color: #d4af37;
    border: 2px solid #d4af37;
}

.podium {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 10px;
    margin: 30px 0;
}

.podium-card {
    width: 130px;
    padding: 10px;
    border-radius: 10px;
    color: black;
    font-weight: bold;
}

.first { background: gold; height: 160px; order: 2; }
.second { background: silver; height: 130px; order: 1; }
.third { background: peru; height: 110px; order: 3; }

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: gold;
    color: black;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #333;
}

.highlight {
    background: rgba(212,175,55,0.1);
}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<div class="glass-panel">
<h1>HAFTALIK ARŞİV</h1>

<div class="filters">
<select id="yS"></select>
<select id="mS" disabled></select>
<select id="wS" disabled></select>
</div>
</div>

<div id="dataArea" style="display:none;">
<div id="podium" class="podium"></div>

<table>
<thead>
<tr>
<th>#</th>
<th>Nick</th>
<th>Kills</th>
<th>HS</th>
<th>Deaths</th>
<th>Damage</th>
<th>Acc</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>
</div>

<script>
const client = supabase.createClient(
    "https://cyeklyjeszniowopawpc.supabase.co",
    "sb_publishable_RUhk34F8aZiNcgIDIZAwCA_8ZATrGh0"
);

let db = [];

// 🔒 XSS SAFE
const safe = (s) => {
    const div = document.createElement("div");
    div.textContent = s;
    return div.innerHTML;
};

function formatDate(s){
    const [y,m,d]=s.split("-");
    return `${d}.${m}.${y}`;
}

/* ================= INIT ================= */

async function init(){
    const {data,error} = await client
        .from("weekly_top15")
        .select("week_start,week_end")
        .order("week_end",{ascending:false});

    if(error){
        console.error(error);
        return;
    }

    const map = new Map();

    data.forEach(w=>{
        const key = w.week_start+"|"+w.week_end;

        if(!map.has(key)){
            const d = new Date(w.week_start);

            map.set(key,{
                s:w.week_start,
                y:d.getFullYear(),
                m:d.getMonth(),
                label:`${formatDate(w.week_start)} - ${formatDate(w.week_end)}`
            });
        }
    });

    db = Array.from(map.values());

    const ySet = [...new Set(db.map(x=>x.y))];

    const yS = document.getElementById("yS");

    yS.innerHTML = `<option value="">Yıl</option>`;

    ySet.forEach(y=>{
        yS.innerHTML += `<option value="${y}">${y}</option>`;
    });
}

/* ================= FILTER ================= */

document.getElementById("yS").onchange = () => {
    const y = yS.value;
    mS.innerHTML = `<option value="">Ay</option>`;
    wS.innerHTML = `<option value="">Hafta</option>`;
    wS.disabled = true;

    if(!y){
        mS.disabled = true;
        return;
    }

    const months = [...new Set(db.filter(d=>d.y==y).map(d=>d.m))];

    months.forEach(m=>{
        mS.innerHTML += `<option value="${m}">${m+1}</option>`;
    });

    mS.disabled = false;
};

document.getElementById("mS").onchange = () => {
    const y = yS.value;
    const m = mS.value;

    wS.innerHTML = `<option value="">Hafta</option>`;

    if(m===""){
        wS.disabled = true;
        return;
    }

    const weeks = db.filter(d=>d.y==y && d.m==m);

    weeks.forEach(w=>{
        wS.innerHTML += `<option value="${w.s}">${w.label}</option>`;
    });

    wS.disabled = false;
};

/* ================= FETCH ================= */

document.getElementById("wS").onchange = async () => {
    const s = wS.value;

    if(!s) return;

    const {data,error} = await client
        .from("weekly_top15")
        .select("*")
        .eq("week_start",s)
        .order("rank");

    if(error){
        console.error(error);
        return;
    }

    render(data);
};

/* ================= RENDER ================= */

function render(data){
    document.getElementById("dataArea").style.display="block";

    renderPodium(data);
    renderTable(data);
}

function renderPodium(data){
    const p = document.getElementById("podium");

    const sorted = [...data].sort((a,b)=>a.rank-b.rank);

    const list = [sorted[1], sorted[0], sorted[2]];

    let html = "";

    ["second","first","third"].forEach((cls,i)=>{
        const d = list[i];

        if(!d){
            html += `<div class="podium-card"></div>`;
            return;
        }

        html += `
        <div class="podium-card ${cls}">
            <div>#${d.rank}</div>
            <div>${safe(d.nick)}</div>
            <div>${d.kills}</div>
        </div>`;
    });

    p.innerHTML = html;
}

function renderTable(data){
    const sorted = [...data].sort((a,b)=>a.rank-b.rank);

    const html = sorted.map(p=>`
        <tr class="${p.rank<=3?'highlight':''}">
            <td>${p.rank}</td>
            <td>${safe(p.nick)}</td>
            <td>${p.kills}</td>
            <td>${p.hs_percent}%</td>
            <td>${p.deaths}</td>
            <td>${p.mermiler}</td>
            <td>${p.accuracy}%</td>
        </tr>
    `).join("");

    document.getElementById("tbody").innerHTML = html;
}

init();
</script>

</body>
</html>
