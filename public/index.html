<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehrin Efendileri | Haftalık Arşiv</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 95%;
            max-width: 1000px;
            text-align: center;
        }

        .header h1 { color: #d4af37; text-transform: uppercase; letter-spacing: 3px; margin: 0; font-size: 2.5em; }
        .header p { color: #aaa; margin-bottom: 30px; }

        .controls select {
            padding: 12px 20px;
            border-radius: 8px;
            background: #222;
            color: gold;
            border: 1px solid #d4af37;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .top-podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin-bottom: 50px;
            height: 300px;
        }

        .podium-item {
            width: 180px;
            border-radius: 10px 10px 0 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 15px;
            font-weight: bold;
            color: #000;
        }

        .first { background: linear-gradient(#d4af37, #f9e272); height: 100%; order: 2; transform: scale(1.1); }
        .second { background: linear-gradient(#aaa, #eee); height: 80%; order: 1; }
        .third { background: linear-gradient(#cd7f32, #f5af64); height: 70%; order: 3; }

        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .ranking-table th { color: #d4af37; padding: 15px; border-bottom: 2px solid #d4af37; }
        .ranking-table td { padding: 12px; border-bottom: 1px solid #333; }

        /* MOBİL AYAR */
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .top-podium { height: 220px; gap: 5px; }
            .podium-item { width: 30%; font-size: 0.7em; padding: 5px; }
            .header h1 { font-size: 1.5em; }
            .ranking-table { font-size: 0.75em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ŞEHRİN EFENDİLERİ</h1>
            <p>Haftalık Arşiv & Onur Listesi</p>
        </div>

        <div class="controls">
            <select id="weekSelector"><option>Yükleniyor...</option></select>
        </div>

        <div id="podiumArea" class="top-podium"></div>

        <table class="ranking-table">
            <thead>
                <tr>
                    <th>Sıra</th>
                    <th>Nick</th>
                    <th>Kill</th>
                    <th>HS %</th>
                    <th>Acc %</th>
                </tr>
            </thead>
            <tbody id="rankingBody"></tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = "https://cyeklyjeszniowopawpc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_RUhk34F8aZiNcgIDIZAwCA_8ZATrGh0";
        
        // Supabase bağlantısını başlat
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadWeeks() {
            try {
                const { data, error } = await supabase.from('weekly_top15').select('week_start, week_end').order('week_end', { ascending: false });
                if (error) throw error;

                const selector = document.getElementById('weekSelector');
                if (!data || data.length === 0) {
                    selector.innerHTML = '<option>Henüz arşiv yok</option>';
                    return;
                }

                // Benzersiz haftaları ayıkla
                const map = new Map();
                data.forEach(w => {
                    const key = `${w.week_start} | ${w.week_end}`;
                    if (!map.has(key)) map.set(key, w);
                });

                const weekCache = Array.from(map.values());
                selector.innerHTML = '';
                weekCache.forEach(w => {
                    const opt = document.createElement('option');
                    opt.value = w.week_start;
                    opt.textContent = `${w.week_start} / ${w.week_end}`;
                    selector.appendChild(opt);
                });

                loadData(weekCache[0].week_start);
            } catch (err) { console.error(err); }
        }

        async function loadData(weekStart) {
            const { data } = await supabase.from('weekly_top15').select('*').eq('week_start', weekStart).order('rank', { ascending: true });
            if (data) {
                renderPodium(data.slice(0, 3));
                renderTable(data.slice(3));
            }
        }

        function renderPodium(top3) {
            const area = document.getElementById('podiumArea');
            area.innerHTML = '';
            const order = [1, 0, 2]; // 2. - 1. - 3. dizilimi
            const classes = ['second', 'first', 'third'];

            order.forEach((pos, i) => {
                const p = top3[pos];
                if (!p) return;
                const div = document.createElement('div');
                div.className = `podium-item ${classes[i]}`;
                div.innerHTML = `<p style="font-size:2em;margin:0">#${p.rank}</p><p style="word-break:break-all">${p.nick.replace(/[<>]/g, '')}</p><p>${p.kills} K</p>`;
                area.appendChild(div);
            });
        }

        function renderTable(players) {
            document.getElementById('rankingBody').innerHTML = players.map(p => `
                <tr><td>${p.rank}</td><td>${p.nick.replace(/[<>]/g, '')}</td><td>${p.kills}</td><td>${p.hs_percent}%</td><td>${p.accuracy}%</td></tr>
            `).join('');
        }

        document.getElementById('weekSelector').addEventListener('change', (e) => loadData(e.target.value));
        loadWeeks();
    </script>
</body>
</html>
