<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Şehrin Efendileri | Haftalık Arşiv</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('bg.jpg') no-repeat center center fixed; background-size: cover; color: #f0f0f0; overflow-x: hidden; }
        .overlay { background: rgba(0, 0, 0, 0.60); min-height: 100vh; padding: 20px 0; }
        .container { width: 95%; max-width: 1200px; margin: auto; text-align: center; }
        .glass-panel { background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h1 { color: #d4af37; text-transform: uppercase; letter-spacing: 5px; font-size: 2.8rem; margin: 10px 0; }
        .archive-desc { color: #ccc; font-size: 1.1rem; margin-bottom: 20px; line-height: 1.6; }
        .filters { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        select { padding: 10px 20px; background: black; color: #d4af37; border: 2px solid #d4af37; border-radius: 5px; cursor: pointer; font-weight: bold; }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin: 30px 0; }
        .podium-card { width: 140px; padding: 15px; border-radius: 15px 15px 0 0; color: white; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: flex-start; align-items: center; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s ease; }
        .podium-card:hover { transform: translateY(-10px); }
        .podium-nick { font-size: 0.85rem; word-break: break-all; margin: 10px 0; line-height: 1.2; max-height: 3em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .first { background: linear-gradient(to top, #d4af37, #f1c40f); height: 180px; order: 2; }
        .second { background: linear-gradient(to top, #bdc3c7, #95a5a6); height: 140px; order: 1; }
        .third { background: linear-gradient(to top, #a0522d, #cd7f32); height: 120px; order: 3; }
        .table-wrap { overflow-x: auto; border-radius: 12px; background: rgba(0,0,0,0.8); border: 1px solid rgba(212, 175, 55, 0.3); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: gold; color: black; padding: 12px 10px; text-transform: uppercase; font-size: 0.75rem; position: sticky; top: 0; z-index: 30; }
        td { padding: 10px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        th:nth-child(2), td:nth-child(2) { position: sticky; left: 0; background: #111 !important; z-index: 25; min-width: 140px; box-shadow: 2px 0 0 0 #d4af37; }
        th:nth-child(2) { z-index: 31; background: gold !important; box-shadow: 2px 0 0 0 gold; }
        tbody tr:hover td { background: rgba(212, 175, 55, 0.2) !important; }
        .selected-row td { background: rgba(212, 175, 55, 0.4) !important; color: #fff !important; border-top: 1px solid gold; border-bottom: 1px solid gold; }
        .selected-row td:nth-child(2) { background: #222 !important; }
        .highlight { background: rgba(212, 175, 55, 0.08); }
        .error-msg { color: #ff4d4d; background: rgba(255,0,0,0.1); padding: 12px; border: 1px solid #ff4d4d; border-radius: 5px; margin: 15px 0; display: none; font-weight: bold; }
        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; letter-spacing: 2px; }
            .archive-desc { font-size: 0.85rem; padding: 0 10px; }
            .podium { gap: 5px; margin: 20px 0; }
            .podium-card { width: 32%; padding: 10px 5px; min-height: 100px; }
            .podium-nick { font-size: 0.7rem; }
            td, th { padding: 8px 5px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="overlay">
    <div class="container">
        <div class="glass-panel">
            <h1>ŞEHRİN EFENDİLERİ ARŞİV</h1>
            <p class="archive-desc">Bu sayfada geçmiş haftalara ait Top 15 listeleri yer alır.<br>Aşağıdan tarih aralığı seçerek verilere ulaşabilirsiniz.</p>
            <div id="errorBox" class="error-msg"></div>
            <div class="filters">
                <select id="yS"><option value="">Yıl</option></select>
                <select id="mS" disabled><option value="">Ay</option></select>
                <select id="wS" disabled><option value="">Hafta</option></select>
            </div>
        </div>
        <div id="dataArea" style="display:none;">
            <div id="podium" class="podium"></div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>SIRA</th>
                            <th>NİCK</th>
                            <th>ÖLDÜRME</th>
                            <th>HEADSHOT</th>
                            <th>ÖLÜMLER</th>
                            <th>MERMİLER</th>
                            <th>HEDEF TUTTURMA</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
(function(){
    const SUPABASE_URL = "https://cyeklyjeszniowopawpc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_RUhk34F8aZiNcgIDIZAwCA_8ZATrGh0";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let db = [];
    const aylar = ["OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"];
    let selectionInProgress = false;
    let lastRequestTime = 0;

    const yS = document.getElementById("yS"), mS = document.getElementById("mS"), wS = document.getElementById("wS");
    const errorBox = document.getElementById("errorBox");

    const showError = (msg) => {
        errorBox.textContent = msg;
        errorBox.style.display = "block";
        setTimeout(() => { errorBox.style.display = "none"; }, 6000);
    };

    const safe = (s) => {
        const div = document.createElement("div");
        div.textContent = s || "";
        return div.innerHTML;
    };

    const formatDate = (dateStr) => {
        if(!dateStr) return "";
        const [y, m, d] = dateStr.split("-");
        return `${d}.${m}.${y}`;
    };

    function renderFilters() {
        const currentYear = yS.value;
        yS.innerHTML = `<option value="">Yıl</option>`;
        const years = [...new Set(db.map(x => x.y))].sort((a,b) => b-a);
        years.forEach(y => { yS.innerHTML += `<option value="${y}">${y}</option>`; });
        if(currentYear) yS.value = currentYear;
    }

    function selectLatest() {
        if (db.length > 0 && !selectionInProgress) {
            selectionInProgress = true;
            const latest = db[0]; 
            yS.value = latest.y;
            yS.dispatchEvent(new Event('change')); 
            
            setTimeout(() => {
                mS.value = latest.m;
                mS.dispatchEvent(new Event('change')); 
                setTimeout(() => {
                    wS.value = latest.s;
                    wS.dispatchEvent(new Event('change'));
                    selectionInProgress = false;
                }, 200);
            }, 200);
        }
    }

    async function init(){
        const cachedMenu = localStorage.getItem('archive_menu');
        if(cachedMenu) {
            try {
                db = JSON.parse(cachedMenu);
                renderFilters();
                selectLatest();
            } catch(e) { localStorage.removeItem('archive_menu'); }
        }
        
        const {data, error} = await client.from("weekly_top15").select("week_start,week_end").order("week_end", {ascending: false});
        
        if(error) {
            console.error("Supabase Error:", error);
            if(!db.length) showError("Sunucuya ulaşılamıyor. Lütfen sayfayı yenileyin.");
            return;
        }

        const map = new Map();
        data.forEach(w => {
            const key = w.week_start + "|" + w.week_end;
            if(!map.has(key)){
                const d = new Date(w.week_start);
                map.set(key, { s: w.week_start, y: d.getFullYear(), m: d.getMonth(), label: `${formatDate(w.week_start)} - ${formatDate(w.week_end)}` });
            }
        });

        const newDb = Array.from(map.values());
        const rawCache = localStorage.getItem('archive_menu') || "[]";
        
        if(JSON.stringify(newDb) !== JSON.stringify(JSON.parse(rawCache))) {
            db = newDb;
            localStorage.setItem('archive_menu', JSON.stringify(db));
            renderFilters();
            if(!selectionInProgress) selectLatest();
        }
    }

    yS.onchange = () => {
        mS.innerHTML = `<option value="">Ay</option>`;
        wS.innerHTML = `<option value="">Hafta</option>`;
        wS.disabled = true;
        document.getElementById("dataArea").style.display = "none";
        if(!yS.value){ mS.disabled = true; return; }
        
        [...new Set(db.filter(d => d.y == yS.value).map(d => d.m))].sort((a,b)=>b-a).forEach(m => {
            mS.innerHTML += `<option value="${m}">${aylar[m]}</option>`;
        });
        mS.disabled = false;
    };

    mS.onchange = () => {
        wS.innerHTML = `<option value="">Hafta</option>`;
        document.getElementById("dataArea").style.display = "none";
        if(mS.value === ""){ wS.disabled = true; return; }
        
        db.filter(d => d.y == yS.value && d.m == mS.value).forEach(w => {
            wS.innerHTML += `<option value="${w.s}">${w.label}</option>`;
        });
        wS.disabled = false;
    };

    wS.onchange = async () => {
        if(!wS.value) return;
        const now = Date.now();
        if(now - lastRequestTime < 1000) return;
        lastRequestTime = now;

        const cacheKey = 'week_data_' + wS.value;
        const cachedData = localStorage.getItem(cacheKey);
        if(cachedData) {
            try { render(JSON.parse(cachedData)); } catch(e) {}
        }

        const {data, error} = await client.from("weekly_top15").select("*").eq("week_start", wS.value).order("sira");
        
        if(error) {
            showError("Veriler alınamadı, sunucu yoğun olabilir.");
            return;
        }

        if(data && data.length > 0) {
            localStorage.setItem(cacheKey, JSON.stringify(data));
            render(data);
        } else {
            showError("Bu tarihe ait arşiv kaydı bulunamadı.");
        }
    };

    window.markRow = function(row) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('selected-row'));
        row.classList.add('selected-row');
    }

    function render(data){
        const sorted = [...data].sort((a,b) => (Number(a.sira) || 99) - (Number(b.sira) || 99));
        if(sorted.length === 0) return;

        // Podyum için performansa göre sırala (En çok kill alan ortaya)
        const perfSorted = [...data].sort((a,b) => Number(b.oldurme) - Number(a.oldurme));
        const list = [perfSorted[1], perfSorted[0], perfSorted[2]];
        let phtml = "";
        
        ["second", "first", "third"].forEach((cls, i) => {
            const d = list[i];
            if(!d){ phtml += `<div class="podium-card" style="visibility:hidden"></div>`; return; }
            const crown = i === 1 ? '👑' : ''; 
            phtml += `
                <div class="podium-card ${cls}">
                    <div style="font-size:1.5rem">${crown}</div>
                    <div style="font-size:0.8rem; opacity:0.8;">#${d.sira}</div>
                    <div class="podium-nick">${safe(d.nick)}</div>
                    <div style="font-weight:bold; margin-top:5px;">${d.oldurme} Öldürme</div>
                </div>`;
        });

        document.getElementById("podium").innerHTML = phtml;
        document.getElementById("tbody").innerHTML = sorted.map(p => `
            <tr class="${p.sira <= 3 ? 'highlight' : ''}" onclick="markRow(this)">
                <td style="font-weight:bold; color:#d4af37">#${p.sira}</td>
                <td style="text-align:left; padding-left:15px;">${safe(p.nick)}</td>
                <td>${p.oldurme || 0}</td>
                <td>${p.headshot || "0 (0%)"}</td>
                <td>${p.olumler || "0 (0%)"}</td>
                <td>${p.mermiler || 0}</td>
                <td>${p.hedef_tutturma || "0 (0%)"}</td>
            </tr>`).join("");
        document.getElementById("dataArea").style.display = "block";
    }

    init();
})();
</script>
</body>
</html>
