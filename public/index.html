<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehrin Efendileri | Haftalık Arşiv</title>
    
    <link rel="icon" type="image/png" href="bg.jpg">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: #000 url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #f0f0f0;
            min-height: 100vh;
        }

        /* Arka planı öldürmeyen, sadece içeriği okunur kılan hafif katman */
        .overlay {
            background-color: rgba(0, 0, 0, 0.7);
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            text-align: center;
        }

        /* Cam Panel Efekti (Bulanıklık kaldırıldı, şeffaflık dengelendi) */
        .glass-panel {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .header h1 { color: #d4af37; text-transform: uppercase; letter-spacing: 3px; margin: 0; font-size: 2.2em; }
        .header p { color: #ccc; margin: 10px 0; font-size: 0.95em; }

        /* Filtreleme Alanı */
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        .filter-group { display: flex; flex-direction: column; align-items: center; }
        .filter-group label { color: #d4af37; font-size: 0.75em; margin-bottom: 4px; font-weight: bold; }
        
        select {
            padding: 8px 12px;
            background: #111;
            color: gold;
            border: 1px solid #d4af37;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
        }
        select:disabled { border-color: #444; color: #666; }

        /* Zarif Podyum Alanı */
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            margin: 30px 0;
            height: 240px;
        }

        .podium-card {
            width: 160px;
            border-radius: 10px 10px 0 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 15px;
            font-weight: bold;
            color: #000;
            text-shadow: none;
        }

        .first { background: linear-gradient(#d4af37, #f9e272); height: 100%; order: 2; transform: scale(1.05); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        .second { background: linear-gradient(#c0c0c0, #eee); height: 80%; order: 1; }
        .third { background: linear-gradient(#cd7f32, #f5af64); height: 65%; order: 3; }

        /* Tam Liste Tablosu */
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        .ranking-table th { background: rgba(212, 175, 55, 0.9); color: #000; padding: 12px; font-size: 0.85em; text-transform: uppercase; }
        .ranking-table td { padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); text-align: center; font-size: 0.9em; }
        .ranking-table tr:hover { background: rgba(255, 255, 255, 0.05); }
        .highlight { background: rgba(212, 175, 55, 0.1); font-weight: bold; }

        @media (max-width: 768px) {
            .podium { height: 200px; gap: 5px; }
            .podium-card { width: 32%; font-size: 0.75em; padding: 10px; }
            .header h1 { font-size: 1.5em; }
            .ranking-table th, .ranking-table td { font-size: 0.7em; padding: 8px 4px; }
        }
    </style>
</head>
<body>

<div class="overlay">
    <div class="container">
        
        <div class="glass-panel">
            <div class="header">
                <h1>HAFTALIK ARŞİV</h1>
                <p>
                    Bu sayfada geçmiş haftalara ait Top 15 listeleri yer alır.<br>
                    Aşağıdan tarih aralığı seçerek verilere ulaşabilirsiniz.
                </p>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label>YIL</label>
                    <select id="yS" onchange="upM()"><option value="">Seçiniz</option></select>
                </div>
                <div class="filter-group">
                    <label>AY</label>
                    <select id="mS" onchange="upW()" disabled><option value="">Seçiniz</option></select>
                </div>
                <div class="filter-group">
                    <label>HAFTA</label>
                    <select id="wS" onchange="loadD(this.value)" disabled><option value="">Seçiniz</option></select>
                </div>
            </div>
        </div>

        <div id="podiumArea" class="podium"></div>

        <div class="glass-panel" style="padding: 0; overflow-x: auto;">
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>SIRA</th>
                        <th>NICK</th>
                        <th>ÖLDÜRME</th>
                        <th>HEADSHOT</th>
                        <th>ÖLÜMLER</th>
                        <th>MERMİLER</th>
                        <th>HEDEF TUTTURMA</th>
                    </tr>
                </thead>
                <tbody id="rB"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const S_URL = "https://cyeklyjeszniowopawpc.supabase.co";
    const S_KEY = "sb_publishable_RUhk34F8aZiNcgIDIZAwCA_8ZATrGh0";
    const _c = supabase.createClient(S_URL, S_KEY);

    let db = []; 
    const mN = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];

    function fD(s) { const [y, m, d] = s.split('-'); return `${d}.${m}.${y}`; }

    async function init() {
        const { data } = await _c.from('weekly_top15').select('week_start, week_end').order('week_end', { ascending: false });
        if (!data || data.length === 0) {
            document.getElementById('wS').innerHTML = '<option>Veri Yok</option>';
            return;
        }

        const map = new Map();
        data.forEach(w => {
            const k = `${w.week_start}_${w.week_end}`;
            if (!map.has(k)) {
                const d = new Date(w.week_start);
                map.set(k, { s: w.week_start, y: d.getFullYear(), m: d.getMonth(), l: `${fD(w.week_start)} - ${fD(w.week_end)}` });
            }
        });

        db = Array.from(map.values());
        const yS = document.getElementById('yS');
        [...new Set(db.map(i => i.y))].forEach(y => {
            const o = document.createElement('option'); o.value = y; o.textContent = y; yS.appendChild(o);
        });
    }

    function upM() {
        const y = document.getElementById('yS').value;
        const mS = document.getElementById('mS');
        const wS = document.getElementById('wS');
        mS.innerHTML = '<option value="">Seçiniz</option>';
        wS.disabled = true;

        if (!y) { mS.disabled = true; return; }

        const ms = [...new Set(db.filter(d => d.y == y).map(d => d.m))].sort((a, b) => b - a);
        ms.forEach(m => {
            const o = document.createElement('option'); o.value = m; o.textContent = mN[m]; mS.appendChild(o);
        });
        mS.disabled = false;
    }

    function upW() {
        const y = document.getElementById('yS').value;
        const m = document.getElementById('mS').value;
        const wS = document.getElementById('wS');
        wS.innerHTML = '<option value="">Seçiniz</option>';

        if (m === "") { wS.disabled = true; return; }

        const ws = db.filter(d => d.y == y && d.m == m);
        ws.forEach(w => {
            const o = document.createElement('option'); o.value = w.s; o.textContent = w.l; wS.appendChild(o);
        });
        wS.disabled = false;
    }

    async function loadD(s) {
        if(!s) return;
        const { data } = await _c.from('weekly_top15').select('*').eq('week_start', s).order('rank', { ascending: true });
        if (data) {
            // Podyum
            const pA = document.getElementById('podiumArea');
            pA.innerHTML = '';
            const order = [{ i: 1, c: 'second' }, { i: 0, c: 'first' }, { i: 2, c: 'third' }];
            order.forEach(it => {
                const p = data[it.i];
                if (!p) return;
                pA.innerHTML += `<div class="podium-card ${it.c}">
                    <div style="font-size:2em">#${p.rank}</div>
                    <div style="font-size:0.8em; margin:10px 0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">${p.nick}</div>
                    <div style="font-size:1.1em">${p.kills} KILL</div>
                </div>`;
            });

            // Tam Liste Tablosu
            document.getElementById('rB').innerHTML = data.map(p => `
                <tr class="${p.rank <= 3 ? 'highlight' : ''}">
                    <td><strong>${p.rank}</strong></td>
                    <td>${p.nick}</td>
                    <td>${p.kills}</td>
                    <td>%${p.hs_percent}</td>
                    <td>${p.deaths}</td>
                    <td>${p.mermiler}</td>
                    <td>%${p.accuracy}</td>
                </tr>
            `).join('');
        }
    }

    init();
</script>
</body>
</html>
