<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Şehrin Efendileri | Haftalık Arşiv</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('bg.jpg') no-repeat center center fixed; background-size: cover; color: #f0f0f0; overflow-x: hidden; }
        .overlay { background: rgba(0, 0, 0, 0.65); min-height: 100vh; padding: 20px 0; }
        .container { width: 95%; max-width: 1200px; margin: auto; text-align: center; }
        .glass-panel { background: rgba(15, 15, 15, 0.85); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); }
        h1 { color: #d4af37; text-transform: uppercase; letter-spacing: 5px; font-size: 2.8rem; margin: 10px 0; }
        .archive-desc { color: #ccc; font-size: 1.1rem; margin-bottom: 20px; line-height: 1.6; }
        
        .filters { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; align-items: center; }
        select { padding: 10px 20px; background: black; color: #d4af37; border: 2px solid #d4af37; border-radius: 5px; cursor: pointer; font-weight: bold; }
        select:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 10. Madde: Paylaşım Butonu Stili */
        .share-btn { background: #d4af37; color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .share-btn:hover { background: #fff; transform: scale(1.05); }

        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin: 30px 0; }
        .podium-card { width: 150px; padding: 15px; border-radius: 10px; color: black; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .podium-nick { font-size: 0.85rem; word-break: break-all; margin: 10px 0; line-height: 1.2; max-height: 3em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .first { background: gold; height: 160px; order: 2; border: 2px solid #fff; }
        .second { background: silver; height: 130px; order: 1; }
        .third { background: #cd7f32; height: 110px; order: 3; }

        /* 5. Madde: Okunabilirlik Geliştirmeleri */
        .table-wrap { overflow-x: auto; border-radius: 12px; background: rgba(5, 5, 5, 0.95); border: 1px solid rgba(212, 175, 55, 0.3); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        
        /* 2. Madde: Sıralanabilir Başlıklar */
        th { background: gold; color: black; padding: 12px 10px; text-transform: uppercase; font-size: 0.75rem; position: sticky; top: 0; z-index: 30; cursor: pointer; }
        th:hover { background: #fff; }

        /* Zebra Striping (Okunabilirlik) */
        tbody tr:nth-child(even) { background: rgba(212, 175, 55, 0.05); }
        td { padding: 10px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        
        th:nth-child(2), td:nth-child(2) { position: sticky; left: 0; background: #111 !important; z-index: 25; min-width: 140px; box-shadow: 2px 0 0 0 #d4af37; }
        th:nth-child(2) { z-index: 31; background: gold !important; box-shadow: 2px 0 0 0 gold; }
        
        tbody tr:hover td { background: rgba(212, 175, 55, 0.2) !important; }
        .selected-row td { background: rgba(212, 175, 55, 0.4) !important; color: #fff !important; }

        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; letter-spacing: 2px; }
            .podium-card { width: 32%; padding: 10px 5px; }
            th:nth-child(2), td:nth-child(2) { min-width: 100px; }
            .share-btn { width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>
<div class="overlay" id="captureArea">
    <div class="container">
        <div class="glass-panel">
            <h1>ŞEHRİN EFENDİLERİ ARŞİV</h1>
            <p class="archive-desc">Haftalık mühürlenmiş Top 15 kayıtları.<br>Verileri sütun başlıklarına tıklayarak sıralayabilirsiniz.</p>
            <div id="errorBox" class="error-msg"></div>
            <div class="filters">
                <select id="yS"><option value="">Yıl</option></select>
                <select id="mS" disabled><option value="">Ay</option></select>
                <select id="wS" disabled><option value="">Hafta</option></select>
                <button class="share-btn" onclick="takeScreenshot()">🖼️ SKORU PAYLAŞ</button>
            </div>
        </div>
        <div id="dataArea" style="display:none;">
            <div id="podium" class="podium"></div>
            <div class="table-wrap">
                <table id="rankTable">
                    <thead>
                        <tr>
                            <th onclick="sortTable(0)">SIRA</th>
                            <th onclick="sortTable(1)">NİCK</th>
                            <th onclick="sortTable(2)">ÖLDÜRME</th>
                            <th onclick="sortTable(3)">HEADSHOT</th>
                            <th onclick="sortTable(4)">ÖLÜMLER</th>
                            <th onclick="sortTable(5)">MERMİLER</th>
                            <th onclick="sortTable(6)">HEDEF TUTTURMA</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
(function(){
    const SUPABASE_URL = "https://cyeklyjeszniowopawpc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_RUhk34F8aZiNcgIDIZAwCA_8ZATrGh0";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let db = [];
    const aylar = ["OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"];
    let lastRequestTime = 0;

    const yS = document.getElementById("yS"), mS = document.getElementById("mS"), wS = document.getElementById("wS");

    // 2. Madde: JavaScript ile Tablo Sıralama
    window.sortTable = function(n) {
        const table = document.getElementById("rankTable");
        let switching = true, i, x, y, shouldSwitch, dir = "desc", switchcount = 0;
        while (switching) {
            switching = false;
            let rows = table.rows;
            for (i = 1; i < (rows.length - 1); i++) {
                shouldSwitch = false;
                x = rows[i].getElementsByTagName("TD")[n];
                y = rows[i + 1].getElementsByTagName("TD")[n];
                
                let xVal = x.innerText.toLowerCase().replace('%', '').replace('#', '');
                let yVal = y.innerText.toLowerCase().replace('%', '').replace('#', '');
                
                if (!isNaN(parseFloat(xVal))) {
                    xVal = parseFloat(xVal);
                    yVal = parseFloat(yVal);
                }

                if (dir == "asc") {
                    if (xVal > yVal) { shouldSwitch = true; break; }
                } else if (dir == "desc") {
                    if (xVal < yVal) { shouldSwitch = true; break; }
                }
            }
            if (shouldSwitch) {
                rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
                switching = true;
                switchcount ++;
            } else {
                if (switchcount == 0 && dir == "desc") {
                    dir = "asc";
                    switching = true;
                }
            }
        }
    }

    // 10. Madde: Ekran Görüntüsü Alma Fonksiyonu
    window.takeScreenshot = function() {
        const btn = document.querySelector('.share-btn');
        btn.style.display = 'none'; // Görüntüde buton çıkmasın
        html2canvas(document.querySelector("#captureArea"), {
            backgroundColor: "#000",
            scale: 2
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'sehrin-efendileri-arsiv.png';
            link.href = canvas.toDataURL();
            link.click();
            btn.style.display = 'inline-block';
        });
    }

    const safe = (s) => {
        const div = document.createElement("div");
        div.textContent = s || "";
        return div.innerHTML;
    };

    const formatDate = (dateStr) => {
        if(!dateStr) return "";
        const [y, m, d] = dateStr.split("-");
        return `${d}.${m}.${y}`;
    };

    async function init(){
        const {data, error} = await client.from("weekly_top15").select("week_start,week_end").order("week_end", {ascending: false});
        if(error) return;

        const map = new Map();
        data.forEach(w => {
            const key = w.week_start + "|" + w.week_end;
            if(!map.has(key)){
                const d = new Date(w.week_start);
                map.set(key, { s: w.week_start, y: d.getFullYear(), m: d.getMonth(), label: `${formatDate(w.week_start)} - ${formatDate(w.week_end)}` });
            }
        });

        db = Array.from(map.values());
        yS.innerHTML = `<option value="">Yıl</option>` + [...new Set(db.map(x => x.y))].map(y => `<option value="${y}">${y}</option>`).join("");
    }

    yS.onchange = () => {
        mS.innerHTML = `<option value="">Ay</option>` + [...new Set(db.filter(d => d.y == yS.value).map(d => d.m))].map(m => `<option value="${m}">${aylar[m]}</option>`).join("");
        mS.disabled = false;
        wS.disabled = true;
    };

    mS.onchange = () => {
        wS.innerHTML = `<option value="">Hafta</option>` + db.filter(d => d.y == yS.value && d.m == mS.value).map(w => `<option value="${w.s}">${w.label}</option>`).join("");
        wS.disabled = false;
    };

    wS.onchange = async () => {
        const {data} = await client.from("weekly_top15").select("*").eq("week_start", wS.value).order("sira");
        if(data) render(data);
    };

    function render(data){
        const sorted = [...data].sort((a,b) => (Number(a.sira) || 99) - (Number(b.sira) || 99));
        const list = [sorted[1], sorted[0], sorted[2]];
        
        document.getElementById("podium").innerHTML = ["second", "first", "third"].map((cls, i) => {
            const d = list[i];
            if(!d) return `<div class="podium-card" style="visibility:hidden"></div>`;
            return `<div class="podium-card ${cls}"><div>#${d.sira}</div><div class="podium-nick">${safe(d.nick)}</div><div>${d.oldurme} Öldürme</div></div>`;
        }).join("");

        document.getElementById("tbody").innerHTML = sorted.map(p => `
            <tr>
                <td style="font-weight:bold; color:#d4af37">#${p.sira}</td>
                <td style="text-align:left; padding-left:15px;">${safe(p.nick)}</td>
                <td>${p.oldurme || 0}</td>
                <td>${p.headshot || 0}%</td>
                <td>${p.olumler || 0}</td>
                <td>${p.mermiler || 0}</td>
                <td>${p.hedef_tutturma || 0}%</td>
            </tr>`).join("");
        document.getElementById("dataArea").style.display = "block";
    }

    init();
})();
</script>
</body>
</html>
