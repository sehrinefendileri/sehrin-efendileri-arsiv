<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Şehrin Efendileri | Haftalık Arşiv</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('bg.jpg') no-repeat center center fixed; background-size: cover; color: #f0f0f0; overflow-x: hidden; }
        .overlay { background: rgba(0, 0, 0, 0.60); min-height: 100vh; padding: 20px 0; }
        .container { width: 95%; max-width: 1200px; margin: auto; text-align: center; }
        .glass-panel { background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h1 { color: #d4af37; text-transform: uppercase; letter-spacing: 5px; font-size: 2.8rem; margin: 10px 0; }
        .archive-desc { color: #ccc; font-size: 1.1rem; margin-bottom: 20px; line-height: 1.6; }
        .filters { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        select { padding: 10px 20px; background: black; color: #d4af37; border: 2px solid #d4af37; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Tablo Stilleri */
        .table-wrap { overflow-x: auto; border-radius: 12px; background: rgba(0,0,0,0.8); border: 1px solid rgba(212, 175, 55, 0.3); margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #d4af37; color: black; padding: 12px 15px; text-transform: uppercase; font-size: 0.8rem; font-weight: bold; text-align: center; }
        td { padding: 12px 10px; border-bottom: 1px solid #222; font-size: 0.95rem; cursor: pointer; text-align: center; }
        th:nth-child(2), td:nth-child(2) { text-align: left; padding-left: 20px; }
        
        /* İlk 3 Satır Vurguları */
        .top-1 { background: linear-gradient(90deg, rgba(212, 175, 55, 0.25), transparent) !important; border-left: 4px solid #d4af37; }
        .top-2 { background: linear-gradient(90deg, rgba(192, 192, 192, 0.2), transparent) !important; border-left: 4px solid silver; }
        .top-3 { background: linear-gradient(90deg, rgba(205, 127, 50, 0.2), transparent) !important; border-left: 4px solid #cd7f32; }
        .selected-row td { background: rgba(212, 175, 55, 0.4) !important; color: #fff !important; }
        
        .error-msg { color: #ff4d4d; background: rgba(255,0,0,0.1); padding: 12px; border: 1px solid #ff4d4d; border-radius: 5px; margin: 15px 0; display: none; font-weight: bold; }
        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; letter-spacing: 2px; }
            .archive-desc { font-size: 0.85rem; padding: 0 10px; }
            td, th { padding: 8px 5px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="overlay">
    <div class="container">
        <div class="glass-panel">
            <h1>ŞEHRİN EFENDİLERİ ARŞİV</h1>
            <p class="archive-desc">Bu sayfada geçmiş haftalara ait Top 15 listeleri yer alır.<br>Aşağıdan tarih aralığı seçerek verilere ulaşabilirsiniz.</p>
            <div id="errorBox" class="error-msg"></div>
            <div class="filters">
                <select id="yS"><option value="">Yıl</option></select>
                <select id="mS" disabled><option value="">Ay</option></select>
                <select id="wS" disabled><option value="">Hafta</option></select>
            </div>
        </div>
        <div id="dataArea" style="display:none;">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>RANK</th><th>NİCK</th><th>KILL</th><th>HS</th><th>ÖLÜM</th><th>MERMİ</th><th>HEDEF</th></tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
(function(){
    const SUPABASE_URL = "https://cyeklyjeszniowopawpc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_RUhk34F8aZiNcgIDIZAwCA_8ZATrGh0";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let db = [];
    const aylar = ["OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"];
    
    const yS = document.getElementById("yS"), mS = document.getElementById("mS"), wS = document.getElementById("wS");
    const errorBox = document.getElementById("errorBox");

    const safe = (s) => { const div = document.createElement("div"); div.textContent = s || ""; return div.innerHTML; };
    const showError = (msg) => { errorBox.textContent = msg; errorBox.style.display = "block"; setTimeout(() => { errorBox.style.display = "none"; }, 6000); };
    const formatDate = (dateStr) => { if(!dateStr) return ""; const [y, m, d] = dateStr.split("-"); return `${d}.${m}.${y}`; };

    function renderFilters() {
        yS.innerHTML = `<option value="">Yıl</option>`;
        [...new Set(db.map(x => x.y))].sort((a,b) => b-a).forEach(y => { yS.innerHTML += `<option value="${y}">${y}</option>`; });
    }

    async function init(){
        const {data, error} = await client.from("weekly_top15").select("week_start,week_end").order("week_end", {ascending: false});
        if(error) return;
        const map = new Map();
        data.forEach(w => {
            const key = w.week_start + "|" + w.week_end;
            if(!map.has(key)){ const d = new Date(w.week_start); map.set(key, { s: w.week_start, y: d.getFullYear(), m: d.getMonth(), label: `${formatDate(w.week_start)} - ${formatDate(w.week_end)}` }); }
        });
        db = Array.from(map.values()); renderFilters();
    }

    yS.onchange = () => {
        mS.innerHTML = `<option value="">Ay</option>`; wS.innerHTML = `<option value="">Hafta</option>`; wS.disabled = true; document.getElementById("dataArea").style.display = "none";
        if(!yS.value){ mS.disabled = true; return; }
        [...new Set(db.filter(d => d.y == yS.value).map(d => d.m))].sort((a,b)=>b-a).forEach(m => { mS.innerHTML += `<option value="${m}">${aylar[m]}</option>`; });
        mS.disabled = false;
    };
    mS.onchange = () => {
        wS.innerHTML = `<option value="">Hafta</option>`; document.getElementById("dataArea").style.display = "none";
        if(mS.value === ""){ wS.disabled = true; return; }
        db.filter(d => d.y == yS.value && d.m == mS.value).forEach(w => { wS.innerHTML += `<option value="${w.s}">${w.label}</option>`; });
        wS.disabled = false;
    };
    wS.onchange = async () => {
        if(!wS.value) return;
        const {data, error} = await client.from("weekly_top15").select("*").eq("week_start", wS.value).order("sira");
        if(error) { showError("Veriler alınamadı."); return; }
        render(data);
    };

    window.markRow = function(row) { document.querySelectorAll('tr').forEach(r => r.classList.remove('selected-row')); row.classList.add('selected-row'); }

    function render(data){
        const sorted = [...data].sort((a,b) => (Number(a.sira) || 99) - (Number(b.sira) || 99));
        document.getElementById("tbody").innerHTML = sorted.map((p, index) => {
            let rankClass = "", rankIcon = `#${p.sira}`;
            if (index === 0) { rankClass = "top-1"; rankIcon = "👑 #" + p.sira; }
            else if (index === 1) { rankClass = "top-2"; rankIcon = "🥈 #" + p.sira; }
            else if (index === 2) { rankClass = "top-3"; rankIcon = "🥉 #" + p.sira; }
            
            return `
            <tr class="${rankClass}" onclick="markRow(this)">
                <td style="font-weight:bold;">${rankIcon}</td>
                <td style="text-align:left; padding-left:15px;">${safe(p.nick)}</td>
                <td>${p.oldurme || 0}</td>
                <td>${p.headshot || 0}</td>
                <td>${p.olumler || 0}</td>
                <td>${p.mermiler || 0}</td>
                <td>${p.hedef_tutturma || 0}</td>
            </tr>`;
        }).join("");
        document.getElementById("dataArea").style.display = "block";
    }
    init();
})();
</script>
</body>
</html>
