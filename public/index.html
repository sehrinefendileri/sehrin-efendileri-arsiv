<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehrin Efendileri | Haftalık Arşiv</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 95%;
            max-width: 1000px;
            text-align: center;
        }

        .header h1 { color: #d4af37; text-transform: uppercase; letter-spacing: 3px; margin: 0; font-size: 2.5em; }
        .header p { color: #aaa; margin-bottom: 30px; }

        .controls select {
            padding: 12px 20px;
            border-radius: 8px;
            background: #222;
            color: gold;
            border: 1px solid #d4af37;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .top-podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin-bottom: 50px;
            height: 320px;
        }

        .podium-item {
            width: 180px;
            border-radius: 10px 10px 0 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 15px;
            font-weight: bold;
            color: #000;
            transition: transform 0.3s;
        }

        .first { background: linear-gradient(#d4af37, #f9e272); height: 100%; order: 2; transform: scale(1.1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
        .second { background: linear-gradient(#aaa, #eee); height: 80%; order: 1; }
        .third { background: linear-gradient(#cd7f32, #f5af64); height: 65%; order: 3; }

        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .ranking-table th { color: #d4af37; padding: 15px; border-bottom: 2px solid #d4af37; text-align: center; }
        .ranking-table td { padding: 12px; border-bottom: 1px solid #333; text-align: center; }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .top-podium { height: 250px; gap: 5px; }
            .podium-item { width: 30%; font-size: 0.8em; padding: 5px; }
            .header h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ŞEHRİN EFENDİLERİ</h1>
            <p>Haftalık Arşiv & Onur Listesi</p>
        </div>

        <div class="controls">
            <select id="weekSelector"><option>Haftalar Yükleniyor...</option></select>
        </div>

        <div id="podiumArea" class="top-podium"></div>

        <table class="ranking-table">
            <thead>
                <tr>
                    <th>Sıra</th>
                    <th>Nick</th>
                    <th>Kill</th>
                    <th>HS %</th>
                    <th>Acc %</th>
                </tr>
            </thead>
            <tbody id="rankingBody"></tbody>
        </table>
    </div>

    <script>
        // ÇAKIŞMAYI ÖNLEMEK İÇİN İSMİ DEĞİŞTİRDİK (_supabase)
        const S_URL = "https://cyeklyjeszniowopawpc.supabase.co";
        const S_KEY = "sb_publishable_RUhk34F8aZiNcgIDIZAwCA_8ZATrGh0";
        
        // Supabase istemcisini başlat
        const _client = supabase.createClient(S_URL, S_KEY);

        async function loadWeeks() {
            try {
                const { data, error } = await _client
                    .from('weekly_top15')
                    .select('week_start, week_end')
                    .order('week_end', { ascending: false });

                if (error) throw error;

                const selector = document.getElementById('weekSelector');
                if (!data || data.length === 0) {
                    selector.innerHTML = '<option>Henüz arşiv yok</option>';
                    return;
                }

                // Benzersiz haftaları ayıkla
                const map = new Map();
                data.forEach(w => {
                    const key = `${w.week_start} | ${w.week_end}`;
                    if (!map.has(key)) map.set(key, w);
                });

                const weekCache = Array.from(map.values());
                selector.innerHTML = '';
                weekCache.forEach(w => {
                    const opt = document.createElement('option');
                    opt.value = w.week_start;
                    opt.textContent = `${w.week_start} / ${w.week_end}`;
                    selector.appendChild(opt);
                });

                // İlk haftayı yükle
                loadData(weekCache[0].week_start);
            } catch (err) { 
                console.error("Hafta yükleme hatası:", err); 
                document.getElementById('weekSelector').innerHTML = '<option>Bağlantı Hatası!</option>';
            }
        }

        async function loadData(weekStart) {
            try {
                const { data, error } = await _client
                    .from('weekly_top15')
                    .select('*')
                    .eq('week_start', weekStart)
                    .order('rank', { ascending: true });

                if (error) throw error;

                if (data) {
                    renderPodium(data.slice(0, 3));
                    renderTable(data.slice(3));
                }
            } catch (err) {
                console.error("Veri yükleme hatası:", err);
            }
        }

        function renderPodium(top3) {
            const area = document.getElementById('podiumArea');
            area.innerHTML = '';
            
            // Görsel dizilim: 2. (Sol) - 1. (Orta) - 3. (Sağ)
            const podiumOrder = [
                { index: 1, class: 'second' },
                { index: 0, class: 'first' },
                { index: 2, class: 'third' }
            ];

            podiumOrder.forEach(item => {
                const p = top3[item.index];
                if (!p) return;
                
                const div = document.createElement('div');
                div.className = `podium-item ${item.class}`;
                div.innerHTML = `
                    <p style="font-size:2em;margin:0">#${p.rank}</p>
                    <p style="word-break:break-all; margin: 10px 0;">${p.nick.replace(/[<>]/g, '')}</p>
                    <p style="font-size:1.2em">${p.kills} KILL</p>
                `;
                area.appendChild(div);
            });
        }

        function renderTable(players) {
            document.getElementById('rankingBody').innerHTML = players.map(p => `
                <tr>
                    <td><strong>${p.rank}</strong></td>
                    <td>${p.nick.replace(/[<>]/g, '')}</td>
                    <td>${p.kills}</td>
                    <td>%${p.hs_percent}</td>
                    <td>%${p.accuracy}</td>
                </tr>
            `).join('');
        }

        document.getElementById('weekSelector').addEventListener('change', (e) => loadData(e.target.value));
        
        // Başlat
        loadWeeks();
    </script>
</body>
</html>
