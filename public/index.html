<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehrin Efendileri | Haftalık Arşiv</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            /* YENİ: Arka plan direkt bg.jpg dosyasından çekiliyor */
            background: #000 url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #f0f0f0;
        }
        .overlay {
            /* Karanlık perdesini %78'den %60'a çektim ki resim patlasın */
            background: rgba(0, 0, 0, 0.60);
            min-height: 100vh;
            padding: 40px 0;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }
        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        h1 { color: #d4af37; text-transform: uppercase; letter-spacing: 3px; }
        .filters { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        select {
            padding: 10px 20px;
            background: black;
            color: #d4af37;
            border: 2px solid #d4af37;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin: 40px 0;
        }
        .podium-card {
            width: 150px;
            padding: 15px;
            border-radius: 10px;
            color: black;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .podium-nick {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 10px 0;
        }
        .first { background: gold; height: 170px; order: 2; border: 2px solid #fff; }
        .second { background: silver; height: 140px; order: 1; }
        .third { background: #cd7f32; height: 120px; order: 3; }

        .table-wrap { overflow-x: auto; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.7); }
        th { background: gold; color: black; padding: 15px; text-transform: uppercase; font-size: 0.8rem; }
        td { padding: 15px; border-bottom: 1px solid #333; }
        .highlight { background: rgba(212, 175, 55, 0.15); }
    </style>
</head>
<body>
<div class="overlay">
    <div class="container">
        <div class="glass-panel">
            <h1>ŞEHRİN EFENDİLERİ ARŞİV</h1>
            <div class="filters">
                <select id="yS"></select>
                <select id="mS" disabled></select>
                <select id="wS" disabled></select>
            </div>
        </div>
        <div id="dataArea" style="display:none;">
            <div id="podium" class="podium"></div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Sıra</th>
                            <th>Nick</th>
                            <th>Öldürme</th>
                            <th>HeadShot</th>
                            <th>Ölümler</th>
                            <th>Mermiler</th>
                            <th>Hedef Tutturma</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
    const client = supabase.createClient("https://cyeklyjeszniowopawpc.supabase.co", "sb_publishable_RUhk34F8aZiNcgIDIZAwCA_8ZATrGh0");
    let db = [];
    const aylar = ["OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"];

    const safe = (s) => {
        const div = document.createElement("div");
        div.textContent = s || "";
        return div.innerHTML;
    };

    async function init(){
        const {data, error} = await client.from("weekly_top15").select("week_start,week_end").order("week_end", {ascending: false});
        if(error) return console.error(error);
        const map = new Map();
        data.forEach(w => {
            const key = w.week_start + "|" + w.week_end;
            if(!map.has(key)){
                const d = new Date(w.week_start);
                map.set(key, { s: w.week_start, y: d.getFullYear(), m: d.getMonth(), label: `${w.week_start} - ${w.week_end}` });
            }
        });
        db = Array.from(map.values());
        const yS = document.getElementById("yS");
        yS.innerHTML = `<option value="">Yıl</option>`;
        [...new Set(db.map(x => x.y))].forEach(y => { yS.innerHTML += `<option value="${y}">${y}</option>`; });
    }

    const yS = document.getElementById("yS"), mS = document.getElementById("mS"), wS = document.getElementById("wS");

    yS.onchange = () => {
        const y = yS.value;
        mS.innerHTML = `<option value="">Ay</option>`;
        wS.innerHTML = `<option value="">Hafta</option>`;
        wS.disabled = true;
        document.getElementById("dataArea").style.display = "none";
        if(!y){ mS.disabled = true; return; }
        [...new Set(db.filter(d => d.y == y).map(d => d.m))].sort((a,b)=>a-b).forEach(m => {
            mS.innerHTML += `<option value="${m}">${aylar[m]}</option>`;
        });
        mS.disabled = false;
    };

    mS.onchange = () => {
        const y = yS.value, m = mS.value;
        wS.innerHTML = `<option value="">Hafta</option>`;
        document.getElementById("dataArea").style.display = "none";
        if(m === ""){ wS.disabled = true; return; }
        db.filter(d => d.y == y && d.m == m).forEach(w => {
            wS.innerHTML += `<option value="${w.s}">${w.label}</option>`;
        });
        wS.disabled = false;
    };

    wS.onchange = async () => {
        const s = wS.value;
        if(!s) return;
        const {data, error} = await client.from("weekly_top15").select("*").eq("week_start", s).order("rank");
        if(error) return;
        render(data);
    };

    function render(data){
        const sorted = [...data].sort((a,b) => (Number(a.rank) || 99) - (Number(b.rank) || 99));
        // Podyum
        const list = [sorted[1], sorted[0], sorted[2]];
        let phtml = "";
        ["second", "first", "third"].forEach((cls, i) => {
            const d = list[i];
            if(!d){ phtml += `<div class="podium-card" style="visibility:hidden"></div>`; return; }
            phtml += `<div class="podium-card ${cls}"><div style="font-size:1.2rem">#${d.rank}</div><div class="podium-nick">${safe(d.nick)}</div><div style="font-size:1rem">${d.kills} Kills</div></div>`;
        });
        document.getElementById("podium").innerHTML = phtml;
        // Tablo
        document.getElementById("tbody").innerHTML = sorted.map(p => `
            <tr class="${p.rank <= 3 ? 'highlight' : ''}">
                <td style="font-weight:bold; color:#d4af37">#${p.rank}</td>
                <td style="text-align:left; padding-left:25px;">${safe(p.nick)}</td>
                <td>${p.kills || 0}</td>
                <td>${p.hs_percent || 0}%</td>
                <td>${p.deaths || 0}</td>
                <td>${p.mermiler || 0}</td>
                <td>${p.accuracy || 0}%</td>
            </tr>`).join("");
        document.getElementById("dataArea").style.display = "block";
    }
    init();
</script>
</body>
</html>
